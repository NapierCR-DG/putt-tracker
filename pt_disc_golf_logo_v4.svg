<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">PT Disc Golf Logo</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A clean disc golf themed logo featuring the letters PT on a green disc with Putt Tracker text inside the disc</desc>

<circle cx="340" cy="180" r="150" fill="#1a5e3a" stroke="#0d3d24" stroke-width="3" style="fill:rgb(26, 94, 58);stroke:rgb(13, 61, 36);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<text x="346" y="210" text-anchor="middle" font-family="'Georgia', serif" font-size="120" font-weight="700" fill="#f0e6c8" letter-spacing="12" style="fill:rgb(240, 230, 200);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:120px;font-weight:700;text-anchor:middle;dominant-baseline:auto">PT</text>

<text x="346" y="255" text-anchor="middle" font-family="'Georgia', serif" font-size="18" font-weight="400" fill="#f0e6c8" letter-spacing="8" style="fill:rgb(240, 230, 200);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:18px;font-weight:400;text-anchor:middle;dominant-baseline:auto">PUTT TRACKER</text>

